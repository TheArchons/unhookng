<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #fff;
      margin: 0;
    }

    h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #ff4444;
    }

    label {
      display: flex;
      align-items: center;
      padding: 4px 0;
      cursor: pointer;
    }

    label:hover {
      background: #333;
    }

    label.sub {
      padding-left: 20px;
      font-size: 12px;
      color: #aaa;
    }

    input[type="checkbox"] {
      margin-right: 8px;
      accent-color: #ff4444;
    }
  </style>
</head>
<body>
  <h3>Unhook NG</h3>

  <label>
    <input type="checkbox" id="hideHomeFeed">
    Hide Home Feed
  </label>
    <label class="sub">
      <input type="checkbox" id="redirectToSubscriptions">
      Redirect To Subscriptions
    </label>

  <label>
    <input type="checkbox" id="hideVideoSidebar">
    Hide Video Sidebar
  </label>
    <label class="sub">
      <input type="checkbox" id="hideRecommended">
      Hide Recommended
    </label>
    <label class="sub">
      <input type="checkbox" id="hideLiveChat">
      Hide Live Chat
    </label>
    <label class="sub">
      <input type="checkbox" id="hidePlaylist">
      Hide Playlist
    </label>
    <label class="sub">
      <input type="checkbox" id="hideFundraiser">
      Hide Fundraiser
    </label>

  <label>
    <input type="checkbox" id="hideEndScreenCards">
    Hide End Screen Cards
  </label>

  <label>
    <input type="checkbox" id="hideShorts">
    Hide Shorts
  </label>

  <label>
    <input type="checkbox" id="hideComments">
    Hide Comments
  </label>
    <label class="sub">
      <input type="checkbox" id="hideProfilePhotos">
      Hide Profile Photos
    </label>

  <label>
    <input type="checkbox" id="hideMixes">
    Hide Mixes
  </label>

  <label>
    <input type="checkbox" id="hideMerch">
    Hide Merch
  </label>

  <label>
    <input type="checkbox" id="hideVideoInfo">
    Hide Video Info
  </label>
    <label class="sub">
      <input type="checkbox" id="hideButtonsBar">
      Hide Buttons Bar
    </label>
    <label class="sub">
      <input type="checkbox" id="hideChannel">
      Hide Channel
    </label>
    <label class="sub">
      <input type="checkbox" id="hideDescription">
      Hide Description
    </label>

  <label>
    <input type="checkbox" id="hideTopHeader">
    Hide Top Header
  </label>
    <label class="sub">
      <input type="checkbox" id="hideNotifications">
      Hide Notifications
    </label>

  <label>
    <input type="checkbox" id="hideExplore">
    Hide Explore
  </label>

  <label>
    <input type="checkbox" id="hideMoreFromYT">
    Hide More from YouTube
  </label>

  <label>
    <input type="checkbox" id="hideSubscriptions">
    Hide Subscriptions
  </label>

  <script src="popup.js"></script>
</body>
</html>
